<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源位数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f7f8;--surface:#fff;--surface2:#f3f3f6;--border:#e5e5ea;--border-light:#efefef;--text:#0f0f0f;--text2:#555;--text3:#999;--orange:#e8590c;--orange-bg:#fff4f0;--blue:#2563eb;--blue-bg:#eff6ff;--green:#16a34a;--green-bg:#f0fdf4;--purple:#7c3aed;--purple-bg:#f5f3ff;--red:#dc2626;--red-bg:#fef2f2;--teal:#0d9488;--teal-bg:#f0fdfa;--r:12px;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.07);--shadow-lg:0 8px 30px rgba(0,0,0,.08)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.dash{max-width:1400px;margin:0 auto;padding:0 32px 80px}

/* Sticky Header */
.sticky-hd{position:sticky;top:0;z-index:100;background:var(--bg);padding-top:20px;padding-bottom:0}
.sticky-hd::after{content:'';position:absolute;bottom:0;left:-32px;right:-32px;height:1px;background:var(--border-light)}
.hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.hd-l{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hd-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hd-actions{display:flex;align-items:center;gap:8px}
.hd-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit}
.hd-btn:hover{border-color:var(--text3);color:var(--text);box-shadow:var(--shadow-sm)}
.hd-btn svg{width:14px;height:14px}
.hd-shortcut{font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:3px;margin-left:4px}

/* Segment Control for Tabs */
.nav-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px}
.seg-btn{padding:7px 20px;border:none;background:0 0;color:var(--text3);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.seg-btn:hover{color:var(--text2)}
.seg-btn.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}

/* Floating Time Capsule — dark style */
.time-capsule{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:2px;background:#1a1a1a;border-radius:10px;padding:3px;box-shadow:0 8px 32px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08)}
.tc-btn{padding:7px 20px;border:none;background:0 0;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.tc-btn:hover{color:rgba(255,255,255,.75)}
.tc-btn.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tc-btn.custom-active{background:rgba(255,255,255,.12);color:#fff;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tc-date-display{font-size:11px;color:rgba(255,255,255,.4);padding:0 6px 0 2px;white-space:nowrap}

/* Custom Date Panel */
.tc-panel{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;box-shadow:var(--shadow-lg);opacity:0;visibility:hidden;transition:all .2s ease;pointer-events:none;min-width:320px}
.tc-panel.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);pointer-events:auto}
.tc-panel-title{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:12px;letter-spacing:.02em}
.tc-panel-row{display:flex;align-items:center;gap:10px}
.tc-panel-row label{font-size:12px;color:var(--text2);flex-shrink:0;width:32px}
.tc-panel-row input[type=date]{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:.15s}
.tc-panel-row input[type=date]:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,89,12,.1)}
.tc-panel-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.tc-panel-btn{padding:6px 16px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
.tc-panel-btn.cancel{background:var(--surface2);color:var(--text2)}
.tc-panel-btn.cancel:hover{background:var(--border)}
.tc-panel-btn.apply{background:var(--orange);color:#fff}
.tc-panel-btn.apply:hover{background:#d14e08}

/* Tab Content */
.tab-content{display:none;padding-top:20px}.tab-content.active{display:block}

/* Insight Bar */
.ov-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ins-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--surface);border:1px solid var(--border-light);border-radius:20px;font-size:12px;transition:all .2s;white-space:nowrap}
.ins-tag:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.ins-icon{display:flex;align-items:center;flex-shrink:0;opacity:.7}
.ins-label{color:var(--text3);font-weight:500;font-size:11px}
.ins-name{font-weight:600;color:var(--text)}
.ins-val{font-weight:700;font-variant-numeric:tabular-nums;font-size:13px}
.ins-cat{font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px}
.ins-cat.popup{background:var(--orange-bg);color:var(--orange)}
.ins-cat.feed{background:var(--blue-bg);color:var(--blue)}
.ins-cat.special{background:var(--purple-bg);color:var(--purple)}

/* Charts */
.ch-sec-3{display:grid;grid-template-columns:3.5fr 5fr 3.5fr;gap:12px;margin-bottom:24px}
.ch-pan{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border-light)}
.ch-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ch-tt{font-size:13px;font-weight:600}
.ch-legend{display:flex;gap:12px}
.ch-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.ch-legend-dot{width:7px;height:7px;border-radius:50%}
.ch-box{width:100%;height:300px}

/* Section Header with Filter */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.sec-tt{font-size:14px;font-weight:600}
.sec-filters{display:flex;align-items:center;gap:6px}
.sec-fbtn{padding:4px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:11px;font-weight:500;border-radius:6px;cursor:pointer;transition:.15s;font-family:inherit}
.sec-fbtn:hover{border-color:var(--text3);color:var(--text2)}
.sec-fbtn.on{background:var(--text);color:#fff;border-color:var(--text)}
.sec-count{font-size:12px;color:var(--text3)}

/* Sort Icon */
.sort-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;color:var(--text3);cursor:pointer;transition:.15s;vertical-align:middle;margin-left:2px}
.sort-icon:hover{background:var(--surface);color:var(--text)}
.sort-icon.active{color:var(--orange);font-weight:700}

/* Table */
.tbl{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-light);overflow:visible;margin-bottom:24px}
.tbl-hd,.tbl-row{display:grid;grid-template-columns:40px 1.4fr .65fr 1fr 1fr 1fr 1fr .7fr 36px;gap:0;padding:0 20px;align-items:center}
.tbl-hd{height:40px;background:var(--surface2);border-bottom:1px solid var(--border-light);font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.02em;user-select:none}
.tbl-row{position:relative;height:64px;border-bottom:1px solid var(--border-light);transition:opacity .35s ease,background .35s ease,transform .35s ease;cursor:default}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:linear-gradient(90deg,rgba(232,89,12,.02),rgba(232,89,12,.04));border-color:rgba(232,89,12,.1)}
.tbl-rank{font-size:12px;font-weight:600;color:var(--text3);text-align:center}
.tbl-rank.top{color:var(--orange);font-weight:700}
.tbl-name-cell{display:flex;align-items:center;gap:10px}
.tbl-thumb{width:34px;height:52px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--surface2);border:1px solid var(--border-light)}
.tbl-thumb img{width:100%;height:100%;object-fit:cover}
.tbl-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);opacity:.4}
.tbl-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-cat{font-size:11px;color:var(--text3);margin-top:1px}
.tbl-tag{display:inline-flex;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.tbl-tag.popup{background:var(--orange-bg);color:var(--orange)}
.tbl-tag.feed{background:var(--blue-bg);color:var(--blue)}
.tbl-tag.special{background:var(--purple-bg);color:var(--purple)}
.tbl-val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.tbl-pct{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center}
.tbl-pct.c-uv{color:#1d4ed8;background:#dbeafe}
.tbl-pct.c-pc{color:#6d28d9;background:#ede9fe}
.tbl-pct.c-cv{color:#15803d;background:#dcfce7}
.tbl-eff{display:flex;align-items:center;gap:8px}
.tbl-eff-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.tbl-eff-ring svg{transform:rotate(-90deg)}
.tbl-eff-ring .ring-bg{fill:none;stroke:var(--surface2);stroke-width:3.5}
.tbl-eff-ring .ring-fg{fill:none;stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .4s}
.tbl-eff-score{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}
.tbl-eff-label{font-size:11px;color:var(--text3);line-height:1.3}
.tbl-eff-label b{display:block;font-size:12px;font-weight:600}

/* Table Detail Trigger & Popover */
.tbl-detail-cell{display:flex;align-items:center;justify-content:center}
.tbl-detail-trigger{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;color:var(--text3);cursor:pointer;transition:all .2s}
.tbl-detail-trigger:hover{color:var(--orange);background:var(--orange-bg)}
.tbl-detail-trigger .pp-card{position:absolute;right:calc(100% + 14px);bottom:0;z-index:600;width:420px;max-height:min(520px,70vh);overflow-y:auto;overflow-x:hidden;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.16);opacity:0;visibility:hidden;transform:translateX(8px);transition:all .22s cubic-bezier(.16,1,.3,1);pointer-events:none}
.tbl-detail-trigger .pp-card.pp-visible{opacity:1;visibility:visible;transform:translateX(0);pointer-events:auto}
.tbl-detail-trigger .pp-card::after{display:none}
.pp-card::-webkit-scrollbar{width:4px}
.pp-card::-webkit-scrollbar-track{background:transparent}
.pp-card::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Popover Card Inner */
.pp-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pp-rank{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.pp-rank.top{background:var(--orange);color:#fff}
.pp-info{display:flex;align-items:center;gap:8px;flex:1}
.pp-name{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:4px}
.pp-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px}
.pp-badge.popup{background:var(--orange-bg);color:var(--orange)}
.pp-badge.feed{background:var(--blue-bg);color:var(--blue)}
.pp-badge.special{background:var(--purple-bg);color:var(--purple)}
.pp-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border-light)}
.pp-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border-light);border-radius:10px;overflow:hidden;margin-bottom:14px}
.pp-metric{text-align:center;padding:12px 4px;background:var(--surface2)}
.pp-metric:first-child{border-radius:10px 0 0 10px}
.pp-metric:last-child{border-radius:0 10px 10px 0}
.pp-metric-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1}
.pp-metric-lbl{font-size:9px;color:var(--text3);margin-top:5px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:2px;white-space:nowrap}
.pp-trend{font-size:8px;font-weight:600;padding:1px 3px;border-radius:3px;white-space:nowrap}
.pp-trend.up{color:var(--green);background:var(--green-bg)}
.pp-trend.dn{color:var(--red);background:var(--red-bg)}
.pp-trend.neutral{color:var(--text3);background:transparent}

/* Popover: enter/exit scene */
.pp-scene{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border-light)}
.pp-scene-row{display:flex;gap:6px;margin-bottom:6px;font-size:10px;line-height:1.5}
.pp-scene-row:last-child{margin-bottom:0}
.pp-scene-label{flex-shrink:0;font-weight:600;color:var(--text2);width:32px}
.pp-scene-text{color:var(--text3)}

/* Popover: contacts */
.pp-contacts{display:flex;gap:16px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-light)}
.pp-contact{display:flex;align-items:center}
.pp-contact-info{display:flex;flex-direction:column}
.pp-contact-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.2;display:flex;align-items:center;gap:4px}
.pp-copy-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;color:var(--text3);cursor:pointer;transition:all .15s;flex-shrink:0}
.pp-copy-btn:hover{color:var(--orange);background:var(--orange-bg)}
.pp-copy-icon{pointer-events:none}
.pp-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) translateY(6px);z-index:9000;background:#1a1a1a;color:#fff;font-size:12px;font-weight:500;padding:8px 20px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:all .25s cubic-bezier(.16,1,.3,1);pointer-events:none}
.pp-toast.show{opacity:1;transform:translate(-50%,-50%) translateY(0)}
.pp-contact-role{font-size:9px;color:var(--text3);line-height:1.2}

.pp-imgs-label{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pp-imgs-count{font-size:9px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:3px}
.pp-imgs{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.pp-imgs::-webkit-scrollbar{height:3px}
.pp-imgs::-webkit-scrollbar-track{background:transparent}
.pp-imgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pp-thumb{flex-shrink:0;width:96px;height:168px;border-radius:8px;overflow:hidden;background:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.pp-thumb img{width:100%;height:100%;object-fit:cover;object-position:top}
.pp-thumb-ph{width:96px;height:168px;border-radius:8px;background:var(--surface2);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.4}

/* Detail Tab */
.detail-filter{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;position:sticky;top:var(--sticky-hd-h,122px);z-index:50;background:var(--bg);padding:12px 0 16px;margin-top:-12px;border-bottom:1px solid var(--border-light)}
.filter-btn{padding:6px 16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;transition:.15s;font-family:inherit}
.filter-btn:hover{border-color:var(--text3);color:var(--text)}
.filter-btn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* Detail Card */
.detail-list{display:flex;flex-direction:column;gap:12px}
.d-row{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-light);transition:all .2s;overflow:hidden}
.d-row:hover{box-shadow:var(--shadow-md);border-color:var(--border)}

/* Section Header (category divider in "all" view) */
.d-section-hd{display:flex;align-items:center;gap:10px;padding:20px 0 8px}
.d-section-hd:first-child{padding-top:0}
.d-section-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.1px}
.d-section-count{font-size:11px;color:var(--text3);font-weight:400}
.d-section-hd::after{content:'';flex:1;height:1px;background:var(--border-light)}

/* Card Content */
.d-row-content{padding:22px 28px}

/* Top: rank + name + badge + desc */
.d-row-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.d-row-rank{width:26px;height:26px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;margin-top:1px}
.d-row-rank.top{background:var(--orange);color:#fff}
.d-row-info{flex:1;min-width:0}
.d-row-title-line{display:flex;align-items:center;gap:8px}
.d-row-name{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text);display:flex;align-items:center;gap:4px}
.d-row-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;flex-shrink:0}
.d-row-badge.popup{background:var(--orange-bg);color:var(--orange)}
.d-row-badge.feed{background:var(--blue-bg);color:var(--blue)}
.d-row-badge.special{background:var(--purple-bg);color:var(--purple)}
.d-row-desc{font-size:12px;color:var(--text3);line-height:1.5;flex-shrink:0;max-width:280px;text-align:right;margin-top:3px}

/* Metrics row */
.d-row-data{display:flex;gap:12px;align-items:stretch}
.d-row-metrics{display:flex;gap:0;background:var(--surface2);border-radius:10px;padding:2px;flex:1;min-width:0}
.d-row-metric{flex:1;text-align:center;padding:12px 8px;border-radius:8px;transition:background .15s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.d-row-metric:hover{background:var(--surface)}
.d-row-metric-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1}
.d-row-metric-label{font-size:10px;color:var(--text3);margin-top:5px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px}

/* Trend tags in detail metrics */
.d-trend{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;white-space:nowrap}
.d-trend.up{color:var(--green);background:var(--green-bg)}
.d-trend.dn{color:var(--red);background:var(--red-bg)}
.d-trend.neutral{color:var(--text3);background:transparent}

/* Detail: enter/exit scene */
.d-row-scene{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-light)}
.d-row-scene-item{display:flex;gap:8px;margin-bottom:6px;font-size:12px;line-height:1.6}
.d-row-scene-item:last-child{margin-bottom:0}
.d-row-scene-label{flex-shrink:0;font-weight:600;color:var(--text2);width:36px}
.d-row-scene-text{color:var(--text3)}

/* Detail: contacts */
.d-row-contacts{display:flex;gap:20px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-light)}
.d-row-contact{display:flex;align-items:center}
.d-row-contact-info{display:flex;flex-direction:column}
.d-row-contact-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;display:flex;align-items:center;gap:4px}
.d-row-contact-role{font-size:10px;color:var(--text3);line-height:1.3}

/* Detail: efficiency summary */

/* Utility: compute period-over-period change */
function getChange(key){
  var periods=['week','month','year'];
  var idx=periods.indexOf(P);
  if(idx<=0) return null;
  var prev=periods[idx-1];
  var curArr=D.map(function(r){return r.d[P][key];});
  var prevArr=D.map(function(r){return r.d[prev][key];});
  if(key==='pv'){
    var curSum=curArr.reduce(function(a,b){return a+b;},0);
    var prevSum=prevArr.reduce(function(a,b){return a+b;},0);
    if(prevSum===0) return null;
    return ((curSum-prevSum)/prevSum*100).toFixed(1);
  } else {
    var curAvg=curArr.reduce(function(a,b){return a+b;},0)/curArr.length;
    var prevAvg=prevArr.reduce(function(a,b){return a+b;},0)/prevArr.length;
    return (curAvg-prevAvg).toFixed(1);
  }
}

function fmt(v){return v>=100000000?(v/100000000).toFixed(1)+'亿':v>=10000?(v/10000).toFixed(1)+'万':v.toLocaleString();}
function sorted(key,asc){
  key=key||'pv';
  var arr=D.slice();
  arr.sort(function(a,b){
    var va=a.d[P][key],vb=b.d[P][key];
    return asc?(va-vb):(vb-va);
  });
  return arr;
}

function switchTab(tab){
  document.querySelectorAll('.seg-btn').forEach(function(b){b.classList.toggle('on',b.dataset.tab===tab);});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='overview') setTimeout(function(){resizeAllCharts();},50);
  if(tab==='detail') renderDetail();
}

function resizeAllCharts(){
  pieChart&&pieChart.resize();barChart&&barChart.resize();bubChart&&bubChart.resize();
}

/* ===== Custom Date Panel ===== */
function toggleCustomPanel(){
  var panel=document.getElementById('tcPanel');
  panel.classList.toggle('show');
}
function closeCustomPanel(){
  document.getElementById('tcPanel').classList.remove('show');
}
function applyCustomRange(){
  var s=document.getElementById('tcStart').value;
  var e=document.getElementById('tcEnd').value;
  if(!s||!e){return;}
  closeCustomPanel();
  P='custom';
  /* update capsule buttons */
  document.querySelectorAll('.tc-btn').forEach(function(b){
    b.classList.remove('on','custom-active');
  });
  document.getElementById('tcCustomBtn').classList.add('custom-active');
  /* show date range */
  document.getElementById('tcDateDisplay').textContent=s.slice(5)+' ~ '+e.slice(5);
  refreshAll();
}

/* click outside to close panel */
document.addEventListener('click',function(e){
  var panel=document.getElementById('tcPanel');
  var btn=document.getElementById('tcCustomBtn');
  if(panel && panel.classList.contains('show') && !panel.contains(e.target) && e.target!==btn){
    closeCustomPanel();
  }
});

/* ===== Export CSV ===== */
function exportCSV(){
  var sd=sorted(tblSort.key,tblSort.asc);
  var filtered=tblFilter==='all'?sd:sd.filter(function(r){return r.cat===tblFilter;});
  var rows=[['排名','资源位','分类','曝光PV','UV点击率(%)','PV点击率(%)','CVR(%)']];
  filtered.forEach(function(r,i){
    var d=r.d[P];
    rows.push([i+1,r.name,r.cat,d.pv,d.uv,d.pc,d.cv]);
  });
  var csv=rows.map(function(row){return row.join(',');}).join('\n');
  var BOM='\uFEFF';

/* ===== Chart Linkage ===== */
var _linkCat=null; /* currently highlighted category name, null = none */
var _linkItem=null; /* currently highlighted single item name, null = none */

/* --- Category-level highlight (used by pie chart) --- */
function highlightCategory(catName){
  if(_linkCat===catName&&!_linkItem) return;
  _linkCat=catName;_linkItem=null;
  _applyHighlight();
}

/* --- Item-level highlight (used by bubble & bar charts) --- */
function highlightItem(itemName){
  if(_linkItem===itemName) return;
  _linkItem=itemName;_linkCat=null;
  _applyHighlight();
}

function clearHighlight(){
  _linkCat=null;_linkItem=null;
  _applyHighlight();
}

function _applyHighlight(){
  var catName=_linkCat;
  var itemName=_linkItem;

  /* --- pie chart: highlight matching sector --- */
  if(pieChart){
    var cats=['弹窗','Feed 挂卡','异形卡'];
    var matchCat=catName;
    if(itemName){
      for(var k=0;k<D.length;k++){if(D[k].name===itemName){matchCat=D[k].cat;break;}}
    }
    cats.forEach(function(cat,i){
      if(!matchCat&&!itemName){ pieChart.dispatchAction({type:'downplay',seriesIndex:0,dataIndex:i}); }
      else if(cat===matchCat){ pieChart.dispatchAction({type:'highlight',seriesIndex:0,dataIndex:i}); }
      else { pieChart.dispatchAction({type:'downplay',seriesIndex:0,dataIndex:i}); }
    });
  }

  /* --- bar chart: dim non-matching bars --- */
  if(barChart){
    var sd=sorted('pv',false);
    barChart.setOption({animationDurationUpdate:350,animationEasingUpdate:'cubicInOut',series:[{data:sd.map(function(r){
      var match;
      if(itemName) match=(r.name===itemName);
      else if(catName) match=(r.cat===catName);
      else match=true;
      return {value:r.d[P].pv,itemStyle:{color:CC[r.cls],borderRadius:[4,4,0,0],opacity:match?1:0.15}};
    })}]});
  }

  /* --- bubble chart: dim non-matching dots --- */
  if(bubChart){
    var maxPV=Math.max.apply(null,D.map(function(r){return r.d[P].pv;}));
    bubChart.setOption({animationDurationUpdate:350,animationEasingUpdate:'cubicInOut',series:[{},{},{
      data:D.map(function(r){
        var d=r.d[P];
        var match;
        if(itemName) match=(r.name===itemName);
        else if(catName) match=(r.cat===catName);
        else match=true;
        return {value:[d.uv,d.cv,d.pv],name:r.name,itemStyle:{opacity:match?0.85:0.08,borderColor:'#fff',borderWidth:1.5}};
      }),
      label:{show:true,formatter:function(p){var n=p.name;return n.length>4?n.slice(0,3)+'…':n;},position:'right',color:'#999',fontSize:10,distance:4}
    }]});
  }

  /* --- table rows: highlight matching --- */
  var rows=document.querySelectorAll('.tbl-row');
  rows.forEach(function(row){
    var nameEl=row.querySelector('.tbl-name');
    var tag=row.querySelector('.tbl-tag');
    if(!tag||!nameEl) return;
    var rowCat=tag.textContent;
    var rowName=nameEl.textContent;
    var match;
    if(itemName) match=(rowName===itemName);
    else if(catName) match=(rowCat===catName);
    else match=true; /* clear */
    if(!catName&&!itemName){
      row.style.opacity='';row.style.background='';row.style.transform='';
    } else if(match){
      row.style.opacity='1';row.style.background='rgba(232,89,12,.04)';row.style.transform='scale(1)';
    } else {
      row.style.opacity='0.25';row.style.background='';row.style.transform='scale(0.99)';
    }
  });
}

  document.getElementById('secCount').textContent='按'+getSortLabel()+' · '+PL[P]+'数据 · '+filtered.length+' 个资源位';

  /* averages for trend tags */
  var avgM={
    pv:D.reduce(function(s,r){return s+r.d[P].pv;},0)/D.length,
    uv:D.reduce(function(s,r){return s+r.d[P].uv;},0)/D.length,
    pc:D.reduce(function(s,r){return s+r.d[P].pc;},0)/D.length,
    cv:D.reduce(function(s,r){return s+r.d[P].cv;},0)/D.length
  };
  function trendT(val,avg){
    var diff=val-avg;var pct=avg>0?((diff/avg)*100).toFixed(0):0;
    if(Math.abs(pct)<5) return '<span class="pp-trend neutral">均值</span>';
    if(diff>0) return '<span class="pp-trend up">↑'+Math.abs(pct)+'%</span>';
    return '<span class="pp-trend dn">↓'+Math.abs(pct)+'%</span>';
  }

  function sortIcon(key){
    var active=tblSort.key===key;

    var arrow=active?(tblSort.asc?'↑':'↓'):'↕';
    return '<span class="'+cls+'" onclick="toggleSort(\''+key+'\')" title="点击排序">'+arrow+'</span>';

  var infoSvg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

  /* compute efficiency scores: weighted composite of uv/pc/cv normalised to max in dataset */
  var maxUV=0,maxPC=0,maxCV2=0;
  filtered.forEach(function(r){var dd=r.d[P];if(dd.uv>maxUV)maxUV=dd.uv;if(dd.pc>maxPC)maxPC=dd.pc;if(dd.cv>maxCV2)maxCV2=dd.cv;});
  function effScore(dd){
    var nUV=maxUV?dd.uv/maxUV:0, nPC=maxPC?dd.pc/maxPC:0, nCV=maxCV2?dd.cv/maxCV2:0;
    return Math.round((nUV*0.3+nPC*0.3+nCV*0.4)*100);
  }
  function effColor(s){return s>=70?'#15803d':s>=40?'#d97706':'#dc2626';}
  function effLabel(s){return s>=70?'优秀':s>=40?'良好':'待优化';}

  filtered.forEach(function(r,i){
    var d=r.d[P],rank=i+1;

    var imgH=firstImg?'<img src="'+firstImg+'">':'<div class="tbl-thumb-ph">'+r.icon+'</div>';
    var score=effScore(d);
    var sColor=effColor(score);
    var sLabel=effLabel(score);
    /* SVG ring: r=14.5, C=2*PI*14.5≈91.1 */
    var C=91.1, dashOff=(C*(1-score/100)).toFixed(1);

    /* popover card content */
    var imgs=r.imgs||[];
    var imgsH='';
    if(imgs.length>0){
      imgs.forEach(function(src){
        imgsH+='<div class="pp-thumb"><img src="'+src+'"></div>';
      });
    } else {
      imgsH='<div class="pp-thumb-ph">'+r.icon+'</div>';
    }

    var copySvg='<svg class="pp-copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    var pp='<div class="pp-card" onmouseenter="ppEnterCard(this)" onmouseleave="ppLeaveCard(this)">';
    pp+='<div class="pp-header"><div class="pp-info"><span class="pp-name">'+r.name+'</span><span class="pp-badge '+r.cls+'">'+r.cat+'</span></div></div>';
    pp+='<div class="pp-desc">'+r.desc+'</div>';
    /* enter/exit scene */
    if(r.enter||r.exit){
      pp+='<div class="pp-scene">';
      if(r.enter) pp+='<div class="pp-scene-row"><span class="pp-scene-label">进场</span><span class="pp-scene-text">'+r.enter+'</span></div>';
      if(r.exit) pp+='<div class="pp-scene-row"><span class="pp-scene-label">出场</span><span class="pp-scene-text">'+r.exit+'</span></div>';
      pp+='</div>';
    }
    /* contacts */
    if(r.owner||r.dev){
      pp+='<div class="pp-contacts">';
      if(r.owner) pp+='<div class="pp-contact"><div class="pp-contact-info"><span class="pp-contact-name">'+r.owner.name+'<span class="pp-copy-btn" onclick="event.stopPropagation();copyName(this,\''+r.owner.name+'\')">' +copySvg+'</span></span><span class="pp-contact-role">'+r.owner.role+' · '+r.owner.team+'</span></div></div>';
      if(r.dev) pp+='<div class="pp-contact"><div class="pp-contact-info"><span class="pp-contact-name">'+r.dev.name+'<span class="pp-copy-btn" onclick="event.stopPropagation();copyName(this,\''+r.dev.name+'\')">' +copySvg+'</span></span><span class="pp-contact-role">'+r.dev.role+' · '+r.dev.team+'</span></div></div>';
      pp+='</div>';
    }
    /* metrics row removed — data already shown in table row */
    pp+='<div class="pp-imgs-label">案例截图 <span class="pp-imgs-count">'+imgs.length+' 张</span></div>';
    pp+='<div class="pp-imgs">'+imgsH+'</div>';
    pp+='</div>';

    h+='<div class="tbl-row ai" style="animation-delay:'+i*0.04+'s">';
    h+='<div class="tbl-rank'+(rank<=3?' top':'')+'">'+rank+'</div>';
    h+='<div class="tbl-name-cell"><div class="tbl-thumb">'+imgH+'</div><div><div class="tbl-name">'+r.name+'</div><div class="tbl-cat">'+r.cat+'</div></div></div>';
    h+='<div><span class="tbl-tag '+r.cls+'">'+r.cat+'</span></div>';
    h+='<div><div class="tbl-val">'+fmt(d.pv)+'</div></div>';
    h+='<div><div class="tbl-pct c-uv">'+d.uv+'%</div></div>';
    h+='<div><div class="tbl-pct c-pc">'+d.pc+'%</div></div>';
    h+='<div><div class="tbl-pct c-cv">'+d.cv+'%</div></div>';
    h+='<div class="tbl-eff"><div class="tbl-eff-ring"><svg width="36" height="36" viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="14.5"/><circle class="ring-fg" cx="18" cy="18" r="14.5" stroke="'+sColor+'" stroke-dasharray="'+C+'" stroke-dashoffset="'+dashOff+'"/></svg><div class="tbl-eff-score" style="color:'+sColor+'">'+score+'</div></div><div class="tbl-eff-label"><b style="color:'+sColor+'">'+sLabel+'</b></div></div>';
    h+='<div class="tbl-detail-cell"><div class="tbl-detail-trigger" onmouseenter="ppEnterTrigger(this)" onmouseleave="ppLeaveTrigger(this)">'+infoSvg+pp+'</div></div>';
    h+='</div>';
  });
  document.getElementById('tbl').innerHTML=h;
}

function getSortLabel(){
  var labels={pv:'曝光量',uv:'UV点击率',pc:'PV点击率',cv:'CVR'};
  return labels[tblSort.key]+(tblSort.asc?'升序':'降序');
}

function toggleSort(key){
  if(tblSort.key===key){
    tblSort.asc=!tblSort.asc;
  } else {
    tblSort.key=key;
    tblSort.asc=false;
  }
  renderTable();
}

function setTblFilter(f){tblFilter=f;renderTable();}

/* ===== Detail Tab ===== */
function renderDetail(){
  var cats=['all','弹窗','Feed 挂卡','异形卡'];
  var fh='';
  cats.forEach(function(c){
    fh+='<button class="filter-btn'+(detailFilter===c?' on':'')+'" onclick="setDetailFilter(\''+c+'\')">'+( c==='all'?'全部 ('+D.length+')':c)+'</button>';
  });
  document.getElementById('detailFilter').innerHTML=fh;

  var sd=sorted(tblSort.key,tblSort.asc);
  var h='';
  var animIdx=0;

  /* compute averages for baseline comparison */
  var avgMetrics={
    pv:D.reduce(function(s,r){return s+r.d[P].pv;},0)/D.length,
    uv:D.reduce(function(s,r){return s+r.d[P].uv;},0)/D.length,
    pc:D.reduce(function(s,r){return s+r.d[P].pc;},0)/D.length,
    cv:D.reduce(function(s,r){return s+r.d[P].cv;},0)/D.length
  };

  function trendTag(val,avg){
    var diff=val-avg;
    var pct=avg>0?((diff/avg)*100).toFixed(0):0;
    if(Math.abs(pct)<5) return '<span class="d-trend neutral">均值</span>';
    if(diff>0) return '<span class="d-trend up">↑'+Math.abs(pct)+'%</span>';
    return '<span class="d-trend dn">↓'+Math.abs(pct)+'%</span>';
  }

  /* efficiency helpers (reuse from table) */
  var maxUV2=0,maxPC2=0,maxCV3=0;
  sd.forEach(function(r){var dd=r.d[P];if(dd.uv>maxUV2)maxUV2=dd.uv;if(dd.pc>maxPC2)maxPC2=dd.pc;if(dd.cv>maxCV3)maxCV3=dd.cv;});
  function dEffScore(dd){
    var nUV=maxUV2?dd.uv/maxUV2:0, nPC=maxPC2?dd.pc/maxPC2:0, nCV=maxCV3?dd.cv/maxCV3:0;
    return Math.round((nUV*0.3+nPC*0.3+nCV*0.4)*100);
  }
  function dEffColor(s){return s>=70?'#15803d':s>=40?'#d97706':'#dc2626';}
  function dEffLabel(s){return s>=70?'优秀':s>=40?'良好':'待优化';}

  var copySvgD='<svg class="pp-copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

  function buildCard(r){
    var d=r.d[P];
    var globalRank=sorted('pv',false).indexOf(r)+1;
    var dScore=dEffScore(d), dColor=dEffColor(dScore), dLabel=dEffLabel(dScore);
    var dC=91.1, dDashOff=(dC*(1-dScore/100)).toFixed(1);

    /* thumbnails */
    var imgs=r.imgs||[];
    var imgsH='';
    var imgsAttr=JSON.stringify(imgs).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    if(imgs.length>0){
      imgs.forEach(function(src,idx){
        imgsH+='<div class="d-thumb" data-imgs="'+imgsAttr+'" data-idx="'+idx+'" onclick="openLightbox(JSON.parse(this.dataset.imgs),+this.dataset.idx)">'+
          '<img src="'+src+'">'+
          (imgs.length>1?'<div class="d-thumb-label">'+(idx+1)+'</div>':'')+
        '</div>';
      });
    } else {
      imgsH='<div class="d-thumb-ph"><div class="d-thumb-ph-icon">'+r.icon+'</div><div class="d-thumb-ph-text">暂无截图</div></div>';
    }

    var screenshotSection=
      '<div class="d-row-screenshots">'+
        '<div class="d-row-imgs-label">案例截图 <span class="d-imgs-count">'+imgs.length+' 张</span></div>'+
        '<div class="d-row-imgs">'+imgsH+'</div>'+
      '</div>';

    /* enter/exit + contacts section */
    var sceneH='';
    if(r.enter||r.exit){
      sceneH='<div class="d-row-scene">';
      if(r.enter) sceneH+='<div class="d-row-scene-item"><span class="d-row-scene-label">进场</span><span class="d-row-scene-text">'+r.enter+'</span></div>';
      if(r.exit) sceneH+='<div class="d-row-scene-item"><span class="d-row-scene-label">出场</span><span class="d-row-scene-text">'+r.exit+'</span></div>';
      sceneH+='</div>';
    }
    var contactH='';
    if(r.owner||r.dev){
      contactH='<div class="d-row-contacts">';
      if(r.owner) contactH+='<div class="d-row-contact"><div class="d-row-contact-info"><span class="d-row-contact-name">'+r.owner.name+'<span class="pp-copy-btn" onclick="event.stopPropagation();copyName(this,\''+r.owner.name+'\')">' +copySvgD+'</span></span><span class="d-row-contact-role">'+r.owner.role+' · '+r.owner.team+'</span></div></div>';
      if(r.dev) contactH+='<div class="d-row-contact"><div class="d-row-contact-info"><span class="d-row-contact-name">'+r.dev.name+'<span class="pp-copy-btn" onclick="event.stopPropagation();copyName(this,\''+r.dev.name+'\')">' +copySvgD+'</span></span><span class="d-row-contact-role">'+r.dev.role+' · '+r.dev.team+'</span></div></div>';
      contactH+='</div>';
    }

    var card='<div class="d-row ai" style="animation-delay:'+animIdx*0.04+'s">'+
      '<div class="d-row-content">'+
        '<div class="d-row-top">'+
          '<div class="d-row-info">'+
            '<div class="d-row-title-line">'+
              '<span class="d-row-name">'+r.name+'</span>'+
              '<span class="d-row-badge '+r.cls+'">'+r.cat+'</span>'+
            '</div>'+
          '</div>'+
          '<div class="d-row-desc">'+r.desc+'</div>'+
        '</div>'+
        sceneH+
        contactH+
        '<div class="d-row-data">'+
          '<div class="d-row-metrics">'+
            '<div class="d-row-metric"><div class="d-row-metric-val" style="color:'+MC.pv+'">'+fmt(d.pv)+'</div><div class="d-row-metric-label">曝光 PV '+trendTag(d.pv,avgMetrics.pv)+'</div></div>'+
            '<div class="d-row-metric"><div class="d-row-metric-val" style="color:'+MC.uv+'">'+d.uv+'%</div><div class="d-row-metric-label">UV 点击率 '+trendTag(d.uv,avgMetrics.uv)+'</div></div>'+
            '<div class="d-row-metric"><div class="d-row-metric-val" style="color:'+MC.pc+'">'+d.pc+'%</div><div class="d-row-metric-label">PV 点击率 '+trendTag(d.pc,avgMetrics.pc)+'</div></div>'+
            '<div class="d-row-metric"><div class="d-row-metric-val" style="color:'+MC.cv+'">'+d.cv+'%</div><div class="d-row-metric-label">CVR '+trendTag(d.cv,avgMetrics.cv)+'</div></div>'+
          '</div>'+
          '<div class="d-row-eff"><div class="d-row-eff-ring"><svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="var(--surface)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="'+dColor+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+Math.round(2*Math.PI*18)+'" stroke-dashoffset="'+((2*Math.PI*18)*(1-dScore/100)).toFixed(1)+'"/></svg><div class="d-row-eff-score" style="color:'+dColor+'">'+dScore+'</div></div><div class="d-row-eff-label">综合效率<br><b style="color:'+dColor+'">'+dLabel+'</b></div></div>'+
        '</div>'+
        screenshotSection+
      '</div>'+
    '</div>';
    animIdx++;
    return card;
  }

  if(detailFilter==='all'){
    /* grouped by category with section headers */
    var groups=['弹窗','Feed 挂卡','异形卡'];
    groups.forEach(function(cat){
      var items=sd.filter(function(r){return r.cat===cat;});
      if(!items.length) return;
      h+='<div class="d-section-hd">'+
          '<span class="d-section-title">'+cat+'</span>'+
          '<span class="d-section-count">'+items.length+' 个资源位</span>'+
        '</div>';
      items.forEach(function(r){ h+=buildCard(r); });
    });
  } else {
    /* single category — flat list, no headers */
    var filtered=sd.filter(function(r){return r.cat===detailFilter;});
    filtered.forEach(function(r){ h+=buildCard(r); });
  }

  document.getElementById('detailList').innerHTML=h;
}

function setDetailFilter(f){detailFilter=f;renderDetail();}

/* ===== Popover Hover (instant show, delayed hide) ===== */
var _ppHideTimer=null;
var _ppCurrent=null;

function ppPositionCard(trigger,card){
  /* default CSS: bottom:0 (card bottom-aligned with trigger) */
  card.style.bottom='0';card.style.top='';
  var cr=card.getBoundingClientRect();
  /* if card overflows above viewport, flip to top-aligned */
  if(cr.top<8){
    card.style.bottom='auto';
    card.style.top='0';
  }
}

function _ppGetRow(el){
  while(el&&!el.classList.contains('tbl-row')) el=el.parentElement;
  return el;
}
function _ppDismiss(card){
  card.classList.remove('pp-visible');
  var row=_ppGetRow(card);
  if(row) row.style.zIndex='';
  _ppCurrent=null;
}

function ppEnterTrigger(trigger){
  var card=trigger.querySelector('.pp-card');
  if(!card) return;
  clearTimeout(_ppHideTimer);
  if(_ppCurrent&&_ppCurrent!==card) _ppDismiss(_ppCurrent);
  var row=_ppGetRow(trigger);
  if(row) row.style.zIndex='100';
  card.classList.add('pp-visible');
  ppPositionCard(trigger,card);
  _ppCurrent=card;
}

function ppLeaveTrigger(trigger){
  _ppHideTimer=setTimeout(function(){
    var card=trigger.querySelector('.pp-card');
    if(card) _ppDismiss(card);
  },800);
}

function ppEnterCard(card){
  clearTimeout(_ppHideTimer);
}

function ppLeaveCard(card){
  _ppHideTimer=setTimeout(function(){
    _ppDismiss(card);
  },300);
}

/* ===== Copy Name + Toast ===== */
function copyName(el,name){
  navigator.clipboard.writeText(name).then(function(){
    showToast('已复制「'+name+'」');
  }).catch(function(){
    /* fallback */
    var ta=document.createElement('textarea');
    ta.value=name;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制「'+name+'」');
  });
}
var _toastTimer=null;
function showToast(msg){
  var t=document.getElementById('ppToast');
  t.textContent=msg;
  t.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},1800);
}

/* ===== Lightbox Gallery ===== */
var _lbImgs=[],_lbIdx=0;
function openLightbox(imgs,idx){
  _lbImgs=imgs;_lbIdx=idx||0;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow='hidden';
  _lbShow();
}
function _lbShow(){
  document.getElementById('lbImg').src=_lbImgs[_lbIdx];
  var counter=document.getElementById('lbCounter');
  var prev=document.getElementById('lbPrev');
  var next=document.getElementById('lbNext');
  if(prev) prev.style.display=_lbImgs.length>1?'flex':'none';
  if(next) next.style.display=_lbImgs.length>1?'flex':'none';
  if(counter){
    counter.style.display=_lbImgs.length>1?'block':'none';
    counter.textContent=(_lbIdx+1)+' / '+_lbImgs.length;
  }
}
function lbGo(dir){
  _lbIdx=(_lbIdx+dir+_lbImgs.length)%_lbImgs.length;
  _lbShow();
}
function lbClickBg(e){
  if(e.target===e.currentTarget) closeLightbox();
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow='';
}

/* ===== Time Switch ===== */
function sw(p){
  P=p;
  /* update capsule buttons */
  document.querySelectorAll('.tc-btn').forEach(function(b){
    b.classList.remove('on','custom-active');
    if(b.dataset.p===p) b.classList.add('on');
  });
  /* clear custom date display when switching to preset */
  if(p!=='custom'){
    document.getElementById('tcDateDisplay').textContent='';
    closeCustomPanel();
  }
  refreshAll();
}

function refreshAll(){
  renderOV();renderChartArea();renderTable();
  if(document.getElementById('tab-detail').classList.contains('active')) renderDetail();
}

/* ===== Keyboard Shortcuts ===== */
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT') return;
/* lightbox navigation */
var lbOpen=document.getElementById('lightbox').classList.contains('show');
if(lbOpen){
  if(e.key==='ArrowLeft') lbGo(-1);
  else if(e.key==='ArrowRight') lbGo(1);
  else if(e.key==='Escape') closeLightbox();
  return;
}
if(e.key==='1') switchTab('overview');
if(e.key==='2') switchTab('detail');
if(e.key==='e'&&(e.metaKey||e.ctrlKey)){e.preventDefault();exportCSV();}
});

/* ===== Init ===== */
/* set sticky header height CSS var for detail filter sticky offset */
function updateStickyHdVar(){
  var hd=document.querySelector('.sticky-hd');
  if(hd) document.documentElement.style.setProperty('--sticky-hd-h',hd.offsetHeight+'px');
}
updateStickyHdVar();
renderOV();renderChartArea();renderTable();
window.addEventListener('resize',function(){resizeAllCharts();updateStickyHdVar();});

</script>
